services:
  postgres-db:
    image: postgres:latest
    container_name: my-postgres-db
    environment:
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql  # <-- Fixed path for PostgreSQL 18+
    networks:
      - pg-network

  pgadmin4:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: srijantrpth@gmail.com
      PGADMIN_DEFAULT_PASSWORD: "123"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres-db
    networks:
      - pg-network

volumes:
  pgdata:
  pgadmin-data:

networks:
  pg-network:
    driver: bridge
